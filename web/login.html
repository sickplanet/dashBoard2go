<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | dashBoard2go</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/style.css">
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: var(--bg-color); }
        .login-box { background: var(--card-bg); padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .login-box h2 { font-weight: 500; margin-bottom: 20px; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--border-color); border-radius: 4px; background: var(--bg-color); color: var(--text-color); }
        .login-box button { width: 100%; background: linear-gradient(to right, var(--primary-color), var(--secondary-color)); color: white; padding: 12px; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .login-box button:hover { opacity: 0.9; }
        #errorMsg { color: var(--danger-color); margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>dashBoard2go</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
            <div id="errorMsg"></div>
        </form>
    </div>

    <script src="/js/core.js"></script>
    <script src="/js/core.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "Authenticating...";
            
            const payload = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            try {
                const data = await apiFetch('/api/v1/auth/login', 'POST', payload);
                
                if (data.is_admin) {
                    window.location.href = '/admin';
                } else {
                    window.location.href = '/user';
                }
            } catch (err) {
                document.getElementById('errorMsg').innerText = err.message || "Network Error";
                btn.innerText = "Login";
            }
        });
    </script>
</body>
</html>

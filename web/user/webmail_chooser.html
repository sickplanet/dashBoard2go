<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webmail Chooser - dashBoard2go</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="/shared/js/theme.js"></script>
    <style>
        body, html { height: 100%; display: flex; align-items: center; justify-content: center; }
        .app-card { transition: 0.3s; cursor: pointer; text-decoration: none; color: inherit; }
        .app-card:hover { border-color: #0dcaf0 !important; background-color: var(--bs-tertiary-bg); }
    </style>
</head>
<body class="bg-body-secondary text-body w-100">
    
    <div class="card shadow-lg border-0" style="max-width: 600px; width: 100%;">
        <div class="card-body p-5 text-center">
            <h2 class="mb-2 fw-bold text-info">Webmail Access</h2>
            <p class="text-muted mb-5">Choose your preferred interface to access your mail.</p>
            
            <div class="row g-4">
                <div class="col-md-6">
                    <a href="/roundcube" class="card app-card h-100 border p-4 text-center d-block">
                        <h4 class="mb-1">Roundcube</h4>
                        <span class="badge bg-success">Recommended</span>
                    </a>
                </div>
                <div class="col-md-6">
                    <a href="/squirrelmail" class="card app-card h-100 border p-4 text-center d-block">
                        <h4 class="mb-1">SquirrelMail</h4>
                        <span class="badge bg-secondary">Legacy Client</span>
                    </a>
                </div>
            </div>
            
            <div class="mt-4 pt-3 border-top">
                <p class="small text-muted mb-0">Powered by dashBoard2go</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/core.js"></script>
    <script src="/js/user.js"></script>
</body>
</html>

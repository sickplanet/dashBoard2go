<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard | dashBoard2go</title>
    <!-- Bootstrap CSS (Dark Mode Default) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #121212; }
        .impersonation-bar { background-color: #dc3545; color: white; padding: 10px; text-align: center; font-weight: bold; }
        .card { background-color: #1e1e1e; border: 1px solid #333; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="impersonationBar" class="impersonation-bar d-none">
        <i class="bi bi-exclamation-triangle"></i> You are logged in as a user. <a href="/admin" class="text-white text-decoration-underline" onclick="returnAdmin()">Return to Admin Dashboard</a>
    </div>

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-white">Hosting Dashboard</h2>
            <button class="btn btn-outline-danger" onclick="logout()">Logout</button>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="card p-3">
                    <h5 class="text-secondary"><i class="bi bi-globe me-2"></i> Domains</h5>
                    <h3>0</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3">
                    <h5 class="text-secondary"><i class="bi bi-envelope me-2"></i> Email Accounts</h5>
                    <h3>0</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3">
                    <h5 class="text-secondary"><i class="bi bi-hdd me-2"></i> Disk Quota</h5>
                    <h3>15% Used</h3>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        if (localStorage.getItem('adminReturn') === 'true') {
            document.getElementById('impersonationBar').classList.remove('d-none');
        }

        function returnAdmin() {
            localStorage.removeItem('adminReturn');
            // Mock reverting explicitly in go routes, but for now client visually removes it.
            window.location.href = '/admin';
        }

        function logout() {
            document.cookie = "dashboard_session=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            window.location.href = '/login';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Settings - dashBoard2go</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="/shared/js/theme.js"></script>
</head>
<body class="bg-body-secondary text-body">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="index.html">dashBoard2go WHM</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="themes.html">Themes</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-8 mx-auto">
                <div class="card shadow-sm border-0">
                    <div class="card-header pt-4">
                        <h4 class="mb-0">Global Theme & Layout Management</h4>
                    </div>
                    <div class="card-body">
                        <form id="themeForm">
                            <div class="mb-4">
                                <label class="form-label fw-bold">Global Default Theme</label>
                                <select class="form-select" id="globalTheme">
                                    <option value="dark">Dark Mode (Default)</option>
                                    <option value="light">Light Mode</option>
                                    <option value="auto">System Auto</option>
                                </select>
                                <div class="form-text">This applies to all users who haven't explicitly set a preference.</div>
                            </div>
                            
                            <hr class="my-4">
                            
                            <h5 class="mb-3">Category Overrides</h5>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Client Panel Theme</label>
                                    <select class="form-select" id="clientTheme">
                                        <option value="inherit">Inherit Global</option>
                                        <option value="light">Force Light</option>
                                        <option value="dark">Force Dark</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Reseller Panel Theme</label>
                                    <select class="form-select" id="resellerTheme">
                                        <option value="inherit">Inherit Global</option>
                                        <option value="light">Force Light</option>
                                        <option value="dark">Force Dark</option>
                                    </select>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary mt-3">Save Preferences</button>
                            <span id="saveStatus" class="ms-3 text-success fw-bold"></span>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/core.js"></script>
    <script src="/js/admin.js"></script>
    <script>
        document.getElementById('themeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;

            // In production -> fetch POST payload config
            await fetch('/api/v1/admin/themes', { method: 'POST' });
            
            document.getElementById('saveStatus').innerText = "Settings Saved!";
            setTimeout(() => { document.getElementById('saveStatus').innerText = ""; btn.disabled = false; }, 3000);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Status - dashBoard2go</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="/shared/js/theme.js"></script>
</head>
<body class="bg-body-secondary text-body">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="index.html">dashBoard2go WHM</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="status.html">Services</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-transparent border-bottom-0 pt-4 pb-0">
                <h4 class="mb-0">Watchdog Service Status</h4>
                <p class="text-muted small">Live background polling</p>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>Daemon</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="service-table-body">
                            <tr><td colspan="2">Loading telemetry...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/core.js"></script>
    <script src="/js/admin.js"></script>
    <script>
        async function fetchStatuses() {
            try {
                const response = await fetch('/api/v1/admin/services');
                const data = await response.json();
                
                const tbody = document.getElementById('service-table-body');
                tbody.innerHTML = '';

                data.forEach(service => {
                    const tr = document.createElement('tr');
                    const badgeClass = service.active ? 'bg-success' : 'bg-danger';
                    const icon = service.active ? 'bi-check-circle-fill' : 'bi-x-circle-fill';
                    
                    tr.innerHTML = `
                        <td class="fw-semibold text-uppercase">${service.service}</td>
                        <td><span class="badge ${badgeClass} px-3 py-2">${service.status}</span></td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                document.getElementById('service-table-body').innerHTML = 
                    '<tr><td colspan="2" class="text-danger fw-bold">API Offline! Daemons unreachable.</td></tr>';
            }
        }
        fetchStatuses(); setInterval(fetchStatuses, 5000);
    </script>
</body>
</html>
